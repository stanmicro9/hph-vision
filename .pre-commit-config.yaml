default_stages:
  - pre-commit
exclude: ^\.yarn/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: 'v3.0.2'
    hooks:
      - id: prettier
        files: ^(packages/(mobile|mobile-lib)/|.*\.(json|md|ya?ml)$)

  - repo: local
    hooks:
      - id: mobile-lint
        name: mobile lint
        entry: yarn mobile:lint
        language: system
        pass_filenames: false
        files: ^packages/mobile/.*\.(js|jsx|ts|tsx)$

      - id: mobile-lib-typecheck
        name: mobile-lib typecheck
        entry: yarn mobile-lib:typecheck
        language: system
        pass_filenames: false
        files: ^packages/mobile-lib/.*\.(ts|tsx)$

      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format --check packages/api-core packages/restapi
        language: system
        pass_filenames: false
        files: ^packages/(api-core|restapi)/.*\.py$

      - id: ruff-check
        name: ruff check
        entry: poetry run ruff check packages/api-core packages/restapi
        language: system
        pass_filenames: false
        files: ^packages/(api-core|restapi)/.*\.py$
